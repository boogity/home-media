services:
  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Chicago
    volumes:
      - ./sonarr-configs:/config
      - "/mnt/homeshare/Media/TV Shows:/tv"
      - /mnt/homeshare/torrents/tv:/downloads
    ports:
      - 8989:8989
    restart: unless-stopped

# Radarr - PVR for Movies
# Overseerr - User-friendly manager for this automation
