# Prowlarr - Centralized management of indexers for all *arrs
---
services:
  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Chicago
    volumes:
      - ./prowlarr-configs:/config
    ports:
      - 9696:9696
    restart: unless-stopped

# Sonarr - PVR to TV
  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Chicago
    volumes:
      - ./sonarr-configs:/config
      - "/mnt/homeshare/Media/TV Shows:/tv"
      - /mnt/homeshare/torrents/tv:/downloads
    ports:
      - 8989:8989
    restart: unless-stopped

# Radarr - PVR for Movies
# Overseerr - User-friendly manager for this automation
# FlareSolverr - Cloudflare likes to block certain indexers, can bypass with this
#     E.g., 1337x.to, EZTV
# Lidarr - DUNNO
# Readarr - Books, skip
# Nginx - Reverse Proxy these bitche/s
