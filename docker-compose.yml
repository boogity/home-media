# Prowlarr - Centralized management of indexers for all *arrs
---
services:
  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Chicago
    volumes:
      - ./prowlarr-configs:/config
    ports:
      - 9696:9696
    restart: unless-stopped

# Sonarr - PVR to TV
  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Chicago
    volumes:
      - ./sonarr-configs:/config
      - "/mnt/homeshare/Media/TV Shows:/mnt/homeshare/Media/TV Shows"
      - /mnt/homeshare/torrents/tv:/mnt/homeshare/torrents/tv
    ports:
      - 8989:8989
    restart: unless-stopped

# Radarr - PVR for Movies
  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Chicago
    volumes:
      - ./radarr-configs:/config
      - /mnt/homeshare/Media/Movies:/mnt/homeshare/Media/Movies
      - /mnt/homeshare/torrents/movies:/mnt/homeshare/torrents/movies
    ports:
      - 7878:7878
    restart: unless-stopped

# Overseerr - User-friendly manager for this automation
  overseerr:
    image: lscr.io/linuxserver/overseerr:latest
    container_name: overseerr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Chicago
    volumes:
      - ./overseerr-configs:/config
    ports:
      - 5055:5055
    restart: unless-stopped

# Nginx - Reverse Proxy these bitche/s
  nginx:
      image: nginx:stable-alpine
      container_name: nginx-rp
      ports:
        - 80:80
      volumes:
        - ./nginx-configs/nginx.conf:/etc/nginx/nginx.conf:ro
      restart: unless-stopped
      depends_on:
        - radarr
        - sonarr
        - overseerr

